services:
  - type: web
    name: acharya-ways-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: acharya-ways-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://your-vercel-url.vercel.app

databases:
  - name: acharya-ways-db
    databaseName: acharya_ways
    user: acharya_admin
    plan: free
